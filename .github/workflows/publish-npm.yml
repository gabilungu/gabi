name: Publish gabi to npm

# Publishes gabi when the version on main is bumped past the one on the
# registry. Pushes that don't change the version are skipped, so a release is
# just: bump the version + changelog, commit, push.
#
# One-time setup: on npmjs.com, add a trusted publisher for the gabi package
# (package Settings → Trusted publisher → GitHub Actions) pointing at this
# repository and this workflow file. No token or secret needed.

on:
  push:
    branches: main
    paths:
      - package.json
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Trusted publishing requires npm 11.5+
      - name: Update npm
        run: npm install -g npm@11

      - name: Skip if this version is already published
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "gabi@$LOCAL" version 2>/dev/null)" ]; then
            echo "gabi@$LOCAL is already on the registry — nothing to do"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.publish == 'true'
        run: npm ci

      - name: Check
        if: steps.version.outputs.publish == 'true'
        run: npm run check

      # npm publish runs the `prepack` script (svelte-package + publint),
      # which builds dist/ from src/lib.
      - name: Publish
        if: steps.version.outputs.publish == 'true'
        run: npm publish --provenance --access public
