name: Deploy docs to GitHub Pages

# Builds the sdocs documentation site and publishes it to GitHub Pages.
# sdocs is run via npx — it is NOT a dependency of gabi. The base path is
# derived from the repo name so the site works under the project sub-path
# (https://<owner>.github.io/<repo>/).
#
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: main
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # gabi's own deps (svelte etc.) — sdocs resolves the project's
      # components and Svelte runtime from here. sdocs itself is not installed.
      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npx --yes sdocs build --base "/${{ github.event.repository.name }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages deployments fail transiently ("try again later") now and then;
      # one automatic retry absorbs it.
      - name: Deploy
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retrying
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v5
